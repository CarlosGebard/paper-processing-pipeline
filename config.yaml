seed_paper: "DOI:10.1056/NEJM199704173361601"

exploration:
  limit: 50
  min_citations: 100
  min_year: 2000
  buffer_size: 50
  max_abstract_words: 300
  seed_doi_file: "data/sources/seed_dois.txt"
  completed_seed_doi_file: "data/sources/explored_seed_dois.txt"

metadata_selection:
  model: "gpt-5-mini"
  abstract_preview_words: 20
  batch_size: 20

api:
  semantic_scholar_url: "https://api.semanticscholar.org/graph/v1"

rate_limit:
  base_delay: 1.0
  max_delay: 30
  retries: 5

storage:
  papers_dir: "data/sources/metadata"
  discarded_dir: "data/sources/discarded_papers"
  registry_dir: "data/sources/registry"
  raw_pdf_dir: "data/stages/01_raw_pdf"

docling_ingestion:
  input_dir: "data/stages/02_input_pdfs"
  output_dir: "data/stages/03_docling_heuristics"

heuristics:
  full_dir: "data/stages/03_docling_heuristics"
  final_dir: "data/stages/03_docling_heuristics"

llm_to_claim:
  input_dir: "data/stages/03_docling_heuristics"
  output_dir: "data/stages/04_claims"
  model: "gpt-5-mini"
  max_claims: 20
  auto_approve_max_tokens: 7000
  temperature: 0.0

testing:
  root_dir: "data/testing"
  docling_output_dir: "data/testing/docling"
  claims_output_dir: "data/testing/claims"
